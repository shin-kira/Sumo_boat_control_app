<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SumoBot Multi-Tasker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <!-- Systems Panel -->
        <div class="ControlPanel LeftControl">
            <h2 class="neon-title">SYSTEMS</h2>
            <div class="arm-controls">
                <button id="liftUpBtn">LIFT UP</button>
                <button id="liftDownBtn">LOWER DOWN</button>
            </div>
            <button class="brake-btn" id="brakeBtn">EMERGENCY BRAKE</button>
            
            <div class="camera-setup">
                <input type="text" id="cameraIp" placeholder="Camera IP">
                <button id="camConnectBtn">CONNECT FEED</button>
            </div>
        </div>

        <!-- Center Feed & Scrollable Log -->
        <div class="CenterControl">
            <div class="Video">
                <p id="camPlaceholder">NO FEED CONNECTED</p>
                <img id="stream" src="" alt="Stream" style="display:none;">
            </div>
            <div class="terminal" id="log">> Multi-Touch Driver Initialized...</div>
        </div>

        <!-- Drive Panel -->
        <div class="ControlPanel RightControl">
            <h2 class="neon-title">DRIVE</h2>
            <div id="joystickZone">
                <div id="stick"></div>
            </div>
            <div class="matrix-display">
                <code>MATRIX: <span id="matrixOut">[[0,0],[0,0]]</span></code>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
